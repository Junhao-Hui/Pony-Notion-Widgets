<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Widget Dashboard</title>
  <style>
    :root{
      color-scheme: light dark;
      --notion-bg: var(--bg-color, var(--notion-bg-color, #f7f6f3));
      --notion-text: var(--text-color, var(--notion-text-color, #2f3437));
      --notion-text-secondary: var(--text-color-secondary, var(--notion-text-secondary, #6b6f76));
      --notion-border: var(--border-color, rgba(55,53,47,.09));
      --notion-hover: var(--hover-color, rgba(55,53,47,.05));
      --notion-accent: var(--accent-color, #2f76ff);

      --bg: var(--notion-bg);
      --text: var(--notion-text);
      --muted: var(--notion-text-secondary);
      --line: var(--notion-border);
      --line-strong: color-mix(in srgb, var(--text) 14%, transparent);
      --hover: var(--notion-hover);
      --accent: var(--notion-accent);
      --accent-strong: color-mix(in srgb, var(--accent) 76%, black);
      --accent-soft: color-mix(in srgb, var(--accent) 16%, transparent);

      --surface: color-mix(in srgb, var(--bg) 96%, var(--text) 4%);
      --surface-strong: color-mix(in srgb, var(--bg) 93%, var(--text) 7%);
      --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 6px 20px rgba(15,23,42,.03);
      --shadow-md: 0 8px 24px rgba(15,23,42,.06), 0 2px 10px rgba(15,23,42,.05);
      --radius-lg: 16px;
      --radius-sm: 10px;
      --transition: 220ms cubic-bezier(.25,.8,.25,1);
      --calendar-width: 320px;
      --progress-width: 320px;
      --widget-gap: 16px;
      --calendar-head-h: 56px;
      --calendar-dow-h: 28px;
      --calendar-row-h: 32px;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --notion-bg: var(--bg-color, var(--notion-bg-color, #191919));
        --notion-text: var(--text-color, var(--notion-text-color, #ebebea));
        --notion-text-secondary: var(--text-color-secondary, var(--notion-text-secondary, #9b9b99));
        --notion-border: var(--border-color, rgba(255,255,255,.09));
        --notion-hover: var(--hover-color, rgba(255,255,255,.06));
        --notion-accent: var(--accent-color, #4f8cff);
        --shadow-sm: 0 1px 2px rgba(0,0,0,.28), 0 8px 20px rgba(0,0,0,.12);
        --shadow-md: 0 10px 28px rgba(0,0,0,.20), 0 4px 12px rgba(0,0,0,.16);
      }
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-variant-numeric:tabular-nums;
    }

    body{
      padding:14px;
      overflow-x:hidden;
    }

    .page{
      width:100%;
      max-width:980px;
      margin:0 auto;
    }

    .dashboard{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:var(--widget-gap);
    }

    .panel{ flex:0 1 auto; }
    .calendar-panel{ width:min(100%, var(--calendar-width)); }
    .progress-panel{
      width:min(100%, var(--progress-width));
      min-height:332px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      width:100%;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
      transition:transform var(--transition), box-shadow var(--transition), background var(--transition), border-color var(--transition);
    }

    .card:hover{
      transform:none;
      box-shadow:var(--shadow-sm);
      border-color:var(--line);
      background:var(--surface);
    }

    .calendar-shell{ padding:6px; }

    #calendari{
      margin:0 auto;
      font-size:12px;
      position:relative;
      width:100%;
      max-width:100%;
      min-height:calc(var(--calendar-head-h) + var(--calendar-dow-h) + (var(--calendar-row-h) * 6));
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:manipulation;
    }

    #calendari table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      position:absolute;
      inset:0;
      background:transparent;
      color:var(--text);
      backface-visibility:hidden;
      transform:translateZ(0);
      will-change:transform, opacity;
    }

    #calendari td,
    #calendari th{
      text-align:center;
      background:transparent;
    }

    #calendari th{
      padding:8px 6px;
      color:var(--text);
      font-weight:600;
    }

    #calendari tr:first-child th{
      position:relative;
      height:var(--calendar-head-h);
      font-size:17px;
      font-weight:700;
      border-bottom:1px solid var(--line);
      padding:6px 54px 4px;
      letter-spacing:-.02em;
    }

    #calendari tr:first-child th > span{
      pointer-events:none;
      display:inline-block;
      line-height:1.1;
    }

    #calendari tr:nth-child(2) th{
      height:var(--calendar-dow-h);
      padding:1px 3px 3px;
      color:var(--muted);
      font-size:10px;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      border-bottom:1px solid var(--line);
    }

    #calendari .any{
      display:block;
      margin-top:2px;
      font-size:10px;
      color:var(--muted);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:600;
    }

    #calendari td{
      padding:0;
      height:var(--calendar-row-h);
      border-bottom:1px solid color-mix(in srgb, var(--line) 60%, transparent);
    }

    #calendari tr:last-child td{ border-bottom:none; }

    #calendari td > span{
      display:grid;
      place-items:center;
      height:100%;
      width:78%;
      margin:0 auto;
      color:var(--text);
      border-radius:6px;
      border:1px solid transparent;
      line-height:1;
      transition:background .15s ease, border-color .15s ease, color .15s ease;
    }

    #calendari td.fora > span{
      opacity:.24;
      color:color-mix(in srgb, var(--text) 22%, transparent);
    }

    #calendari td > span:hover{
      background:var(--hover);
      border-color:color-mix(in srgb, var(--text) 10%, transparent);
    }

    #calendari td:nth-child(even) > span{
      background:color-mix(in srgb, var(--text) 1.2%, transparent);
    }

    #calendari td:last-child > span,
    #calendari td:nth-child(6) > span{
      color:color-mix(in srgb, var(--text) 82%, transparent);
    }

    #calendari td.avui > span{
      background:var(--accent-soft);
      border-color:color-mix(in srgb, var(--accent) 22%, transparent);
      color:var(--accent-strong);
      font-weight:700;
      position:relative;
      opacity:1;
    }

    #calendari td.avui > span::after{
      content:"";
      width:4px;
      height:4px;
      border-radius:999px;
      background:var(--accent);
      position:absolute;
      left:50%;
      bottom:5px;
      transform:translateX(-50%);
    }

    .boto-next,
    .boto-prev,
    .boto-today{
      position:absolute;
      top:8px;
      min-height:32px;
      border-radius:9px;
      border:1px solid color-mix(in srgb, var(--text) 12%, transparent);
      background:color-mix(in srgb, var(--bg) 92%, transparent);
      color:var(--text);
      padding:0;
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      transition:background .15s ease, border-color .15s ease, transform .15s ease, box-shadow .15s ease;
      z-index:2;
      touch-action:manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }

    .boto-prev{ left:6px; width:32px; }
    .boto-next{ right:6px; width:32px; }
    .boto-today{
      right:42px;
      min-width:56px;
      padding:0 10px;
      font-size:10px;
      font-weight:700;
      letter-spacing:.03em;
    }

    .boto-prev svg{ transform:scaleX(-1); }

    .boto-next:hover,
    .boto-prev:hover,
    .boto-today:hover{
      background:var(--hover);
      border-color:color-mix(in srgb, var(--text) 18%, transparent);
      transform:translateY(-1px);
      box-shadow:0 4px 10px rgba(0,0,0,.06);
    }

    .boto-next:focus-visible,
    .boto-prev:focus-visible,
    .boto-today:focus-visible{
      outline:none;
      border-color:color-mix(in srgb, var(--accent) 45%, transparent);
      box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .boto-next svg,
    .boto-prev svg{ width:16px; height:16px; display:block; }

    /* 借用你给的旧版本思路，保留那种更顺的进出场 */
    #calendari table.actiu{
      opacity:1;
      transform:translateX(0);
      transition:transform .28s ease, opacity .28s ease;
      z-index:1;
    }
    #calendari table.inactiu{
      z-index:0;
      transition:transform .28s ease, opacity .28s ease;
    }
    #calendari table.pre-right{ opacity:0; transform:translateX(22px); }
    #calendari table.pre-left{ opacity:0; transform:translateX(-22px); }
    #calendari table.out-left{ opacity:0; transform:translateX(-22px); }
    #calendari table.out-right{ opacity:0; transform:translateX(22px); }

    .progress-card{ max-width:var(--progress-width); }
    .progress-card .head{
      padding:14px 14px 8px;
      display:flex;
      align-items:baseline;
      justify-content:center;
      gap:10px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }
    .progress-card .title{ margin:0; font-size:17px; font-weight:700; letter-spacing:-.02em; }
    .metaTop{ font-size:10px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; font-weight:600; }
    .progress-card .body{ padding:2px 14px 10px; display:flex; flex-direction:column; gap:1px; }
    .row{ padding:8px 0; }
    .row + .row{ border-top:1px solid var(--line); }
    .meta{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:8px; }
    .label{ display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:600; }
    .dot{ width:7px; height:7px; border-radius:999px; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); flex:0 0 auto; }
    .right{ display:inline-flex; align-items:baseline; gap:10px; white-space:nowrap; }
    .pct,.count{ font-size:10px; color:var(--muted); letter-spacing:.04em; font-weight:600; }
    .bar{ height:8px; border-radius:999px; border:1px solid var(--line); background:color-mix(in srgb, var(--text) 5%, var(--bg)); overflow:hidden; }
    .fill{ height:100%; width:0%; border-radius:inherit; background:linear-gradient(90deg, color-mix(in srgb, var(--accent) 92%, white), color-mix(in srgb, var(--accent) 72%, black)); transition:width .6s cubic-bezier(.2,.8,.2,1); }

    @media (max-width: 820px){
      body{ padding:12px; }
      .dashboard{ flex-direction:column; align-items:center; }
      .calendar-panel, .progress-panel{ width:min(100%, var(--calendar-width)); }
      .progress-panel{ min-height:auto; }
      .progress-card{ max-width:none; }
    }

    @media (max-width: 420px){
      :root{
        --calendar-head-h: 52px;
        --calendar-dow-h: 26px;
        --calendar-row-h: 30px;
      }
      .calendar-shell{ padding:5px; }
      #calendari tr:first-child th{ font-size:16px; padding-left:46px; padding-right:46px; }
      .boto-prev{ left:5px; width:30px; }
      .boto-next{ right:5px; width:30px; }
      .boto-today{ right:39px; min-width:52px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="dashboard">
      <div class="panel calendar-panel">
        <div class="card">
          <div class="calendar-shell">
            <div id="calendari" aria-live="polite"></div>
          </div>
        </div>
      </div>

      <div class="panel progress-panel">
        <div class="card progress-card">
          <div class="head">
            <h2 class="title" id="yearTitle">2026 Progress</h2>
            <div class="metaTop" id="weekText">WEEK —</div>
          </div>
          <div class="body">
            <div class="row">
              <div class="meta">
                <div class="label"><span class="dot"></span>Year</div>
                <div class="right">
                  <div class="count" id="yearCount">—/— 天</div>
                  <div class="pct" id="yearPct">—%</div>
                </div>
              </div>
              <div class="bar"><div class="fill" id="yearFill"></div></div>
            </div>

            <div class="row">
              <div class="meta">
                <div class="label"><span class="dot"></span>Month</div>
                <div class="right">
                  <div class="count" id="monthCount">—/— 天</div>
                  <div class="pct" id="monthPct">—%</div>
                </div>
              </div>
              <div class="bar"><div class="fill" id="monthFill"></div></div>
            </div>

            <div class="row">
              <div class="meta">
                <div class="label"><span class="dot"></span>Day</div>
                <div class="right">
                  <div class="count" id="dayCount">—/24.0 时</div>
                  <div class="pct" id="dayPct">—%</div>
                </div>
              </div>
              <div class="bar"><div class="fill" id="dayFill"></div></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const CHEVRON_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M9.2 5.6a1 1 0 0 1 1.4 0l6 6a1 1 0 0 1 0 1.4l-6 6a1 1 0 1 1-1.4-1.4L14.8 12 9.2 6.4a1 1 0 0 1 0-1.4z"/></svg>';
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    let calendarDate = new Date();
    let isAnimating = false;

    function pad2(n){ return String(n).padStart(2, '0'); }

    function monthStart(date){
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function buildCalendarTable(data){
      const table = document.createElement('table');
      table.setAttribute('data-actual', `${data.getFullYear()}/${pad2(data.getMonth())}/${pad2(data.getDate())}`);

      let row = document.createElement('tr');
      let titleCell = document.createElement('th');
      titleCell.colSpan = 7;

      const prevBtn = document.createElement('button');
      prevBtn.className = 'boto-prev';
      prevBtn.type = 'button';
      prevBtn.setAttribute('aria-label', 'Previous month');
      prevBtn.innerHTML = CHEVRON_SVG;
      prevBtn.onclick = () => changeMonth(-1);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'boto-next';
      nextBtn.type = 'button';
      nextBtn.setAttribute('aria-label', 'Next month');
      nextBtn.innerHTML = CHEVRON_SVG;
      nextBtn.onclick = () => changeMonth(1);

      const todayBtn = document.createElement('button');
      todayBtn.className = 'boto-today';
      todayBtn.type = 'button';
      todayBtn.textContent = 'Today';
      todayBtn.onclick = () => goToToday();

      const title = document.createElement('span');
      title.innerHTML = `${MONTHS[data.getMonth()]}<span class="any">${data.getFullYear()}</span>`;

      titleCell.appendChild(prevBtn);
      titleCell.appendChild(title);
      titleCell.appendChild(todayBtn);
      titleCell.appendChild(nextBtn);
      row.appendChild(titleCell);
      table.appendChild(row);

      row = document.createElement('tr');
      DAYS.forEach(day => {
        const th = document.createElement('th');
        th.textContent = day;
        row.appendChild(th);
      });
      table.appendChild(row);

      const firstDayIndex = (new Date(data.getFullYear(), data.getMonth(), 1).getDay() + 6) % 7;
      const cursor = new Date(data.getFullYear(), data.getMonth(), 1 - firstDayIndex);
      const today = new Date();

      for(let r = 0; r < 6; r++){
        const tr = document.createElement('tr');
        for(let c = 0; c < 7; c++){
          const td = document.createElement('td');
          const span = document.createElement('span');
          span.textContent = cursor.getDate();
          td.appendChild(span);

          if(cursor.getMonth() !== data.getMonth()) td.className = 'fora';
          if(
            cursor.getDate() === today.getDate() &&
            cursor.getMonth() === today.getMonth() &&
            cursor.getFullYear() === today.getFullYear()
          ) td.className = 'avui';

          cursor.setDate(cursor.getDate() + 1);
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }

      return table;
    }

    function renderCalendar(targetDate, direction = 1){
      if(isAnimating) return;
      const widget = document.getElementById('calendari');
      const current = widget.querySelector('table.actiu') || widget.querySelector('table');
      const incoming = buildCalendarTable(targetDate);
      incoming.className = direction >= 0 ? 'pre-right' : 'pre-left';
      widget.appendChild(incoming);

      if(!current){
        incoming.className = 'actiu';
        calendarDate = new Date(targetDate);
        return;
      }

      isAnimating = true;
      current.classList.remove('actiu');
      current.classList.add('inactiu');

      requestAnimationFrame(() => {
        incoming.className = 'actiu';
        current.classList.add(direction >= 0 ? 'out-left' : 'out-right');
      });

      window.setTimeout(() => {
        const stale = widget.querySelectorAll('table.inactiu');
        stale.forEach(node => node.remove());
        calendarDate = new Date(targetDate);
        isAnimating = false;
      }, 320);
    }

    function changeMonth(offset){
      if(isAnimating) return;
      const next = monthStart(calendarDate);
      next.setMonth(next.getMonth() + offset);
      renderCalendar(next, offset);
    }

    function goToToday(){
      if(isAnimating) return;
      const today = monthStart(new Date());
      const current = monthStart(calendarDate);
      const diff = (today.getFullYear() - current.getFullYear()) * 12 + (today.getMonth() - current.getMonth());
      if(diff === 0) return;
      renderCalendar(today, diff >= 0 ? 1 : -1);
    }

    const clamp01 = x => Math.max(0, Math.min(1, x));
    const pct = x => Math.round(clamp01(x) * 100);
    const round1 = x => Math.round(x * 10) / 10;

    function isoWeekNumber(date = new Date()){
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return { week: Math.ceil((((d - yearStart) / 86400000) + 1) / 7), year: d.getUTCFullYear() };
    }

    const yearRange = d => ({ start:new Date(d.getFullYear(),0,1,0,0,0,0), end:new Date(d.getFullYear()+1,0,1,0,0,0,0) });
    const monthRange = d => ({ start:new Date(d.getFullYear(),d.getMonth(),1,0,0,0,0), end:new Date(d.getFullYear(),d.getMonth()+1,1,0,0,0,0) });
    const dayRange = d => ({ start:new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0), end:new Date(d.getFullYear(),d.getMonth(),d.getDate()+1,0,0,0,0) });

    function setBar(fillId, pctId, value){
      const p = pct(value);
      document.getElementById(fillId).style.width = `${p}%`;
      document.getElementById(pctId).textContent = `${p}%`;
    }

    function renderProgress(){
      const d = new Date();
      const week = isoWeekNumber(d);
      document.getElementById('yearTitle').textContent = `${d.getFullYear()} Progress`;
      document.getElementById('weekText').textContent = `WEEK ${pad2(week.week)} · ${week.year}`;
      {
        const {start, end} = yearRange(d);
        setBar('yearFill', 'yearPct', (d - start) / (end - start));
        document.getElementById('yearCount').textContent = `${Math.floor((d - start) / 86400000)}/${Math.round((end - start) / 86400000)} 天`;
      }
      {
        const {start, end} = monthRange(d);
        setBar('monthFill', 'monthPct', (d - start) / (end - start));
        document.getElementById('monthCount').textContent = `${Math.floor((d - start) / 86400000)}/${Math.round((end - start) / 86400000)} 天`;
      }
      {
        const {start, end} = dayRange(d);
        setBar('dayFill', 'dayPct', (d - start) / (end - start));
        document.getElementById('dayCount').textContent = `${round1((d - start) / 3600000)}/24.0 时`;
      }
    }

    renderCalendar(monthStart(calendarDate), 1);
    renderProgress();
    window.setInterval(renderProgress, 30000);
  </script>
</body>
</html>
